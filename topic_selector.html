<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Conversation Teacher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .topic-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .topic-card.loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .topic-card.active {
            background: #667eea;
            color: white;
        }

        .topic-label {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .topic-level {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .topic-card.active .topic-level {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .topic-description {
            font-size: 0.95em;
            color: #666;
            line-height: 1.5;
        }

        .topic-card.active .topic-description {
            color: rgba(255, 255, 255, 0.9);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: white;
            color: #667eea;
            padding: 14px 32px;
            font-size: 1.1em;
        }

        .btn-start:hover:not(:disabled) {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .voice-select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 16px;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
        }

        .voice-select option {
            color: black;
            background: white;
        }

        .status {
            text-align: center;
            color: white;
            margin-top: 20px;
            min-height: 20px;
            font-size: 0.9em;
        }

        .status.loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .conversation-view {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
        }

        .conversation-view.active {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .topic-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #333;
        }

        .transcript {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .transcript-line {
            margin-bottom: 12px;
        }

        .speaker-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }

        .speaker-text {
            color: #333;
            margin-left: 16px;
        }

        .btn-disconnect {
            background: #ff6b6b;
            color: white;
        }

        .btn-disconnect:hover {
            background: #ff5252;
        }

        .audio-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .listening-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: listening 1s infinite;
        }

        @keyframes listening {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .error-message {
            background: #ffe0e0;
            color: #c92a2a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .topics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="topicSelector" style="display: block;">
            <div class="header">
                <h1>🎓 English Conversation Teacher</h1>
                <p>Learn English through real-time conversation by choosing a topic</p>
            </div>

            <div id="errorMessage"></div>

            <div class="topics-grid" id="topicsGrid">
                <div style="grid-column: 1/-1; text-align: center; color: white;">
                    Loading topics...
                </div>
            </div>

            <div class="controls">
                <select id="voiceSelect" class="voice-select">
                    <option value="NATF0.pt">Natural Female</option>
                    <option value="NATM0.pt">Natural Male</option>
                    <option value="VARF0.pt">Varied Female</option>
                    <option value="VARM0.pt">Varied Male</option>
                </select>
                <button id="startBtn" class="btn-start" disabled>Start Conversation</button>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div id="conversationView" class="conversation-view">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="topic-title" id="topicTitle"></div>
                <button id="disconnectBtn" class="btn-disconnect">Disconnect</button>
            </div>

            <div class="audio-indicator">
                <span class="listening-dot"></span>
                <span>Listening...</span>
            </div>

            <div class="transcript" id="transcript"></div>
        </div>
    </div>

    <script>
        const serverUrl = window.location.origin;
        let selectedTopic = null;
        let ws = null;

        async function loadTopics() {
            try {
                const response = await fetch(`${serverUrl}/api/topics`);
                if (!response.ok) throw new Error('Failed to load topics');
                const topics = await response.json();

                const grid = document.getElementById('topicsGrid');
                grid.innerHTML = '';

                topics.forEach(topic => {
                    const card = document.createElement('div');
                    card.className = 'topic-card';
                    card.innerHTML = `
                        <div class="topic-label">${topic.label}</div>
                        <div class="topic-level">${topic.level}</div>
                        <div class="topic-description">${topic.description}</div>
                    `;
                    card.onclick = () => selectTopic(topic.id, card, topic.label);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading topics:', error);
                showError('Failed to load topics. Please refresh the page.');
            }
        }

        function selectTopic(topicId, cardElement, topicLabel) {
            // Deselect previous
            document.querySelectorAll('.topic-card').forEach(card => {
                card.classList.remove('active');
            });

            // Select new
            selectedTopic = { id: topicId, label: topicLabel };
            cardElement.classList.add('active');
            document.getElementById('startBtn').disabled = false;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.className = 'error-message';
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function clearError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.style.display = 'none';
        }

        async function startConversation() {
            if (!selectedTopic) {
                showError('Please select a topic first');
                return;
            }

            clearError();

            const voice = document.getElementById('voiceSelect').value;
            const textSeed = Math.floor(Math.random() * 1000000);
            const audioSeed = Math.floor(Math.random() * 1000000);

            const wsUrl = `ws${serverUrl.startsWith('https') ? 's' : ''}://${window.location.host}/api/chat` +
                `?topic_id=${encodeURIComponent(selectedTopic.id)}` +
                `&voice_prompt=${encodeURIComponent(voice)}` +
                `&text_seed=${textSeed}` +
                `&audio_seed=${audioSeed}` +
                `&text_temperature=0.7&audio_temperature=0.8&text_topk=25&audio_topk=250`;

            try {
                ws = new WebSocket(wsUrl);
                ws.binaryType = 'arraybuffer';

                ws.onopen = () => {
                    console.log('Connected to server');
                    showConversationView();
                    setStatus('Connected. Waiting for response...');
                };

                ws.onmessage = (event) => {
                    const data = new Uint8Array(event.data);
                    const messageKind = data[0];

                    if (messageKind === 0) {
                        // Handshake
                        setStatus('Ready to talk!');
                    } else if (messageKind === 2) {
                        // Text message
                        const text = new TextDecoder().decode(data.slice(1));
                        addTranscriptLine('Teacher', text, true);
                    }
                    // messageKind === 1 is audio, handled by audio system
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showError('Connection error. Please try again.');
                    disconnect();
                };

                ws.onclose = () => {
                    console.log('Disconnected');
                    showError('Connection closed');
                    disconnect();
                };

                // Start sending audio (simplified - in real app, would use microphone)
                setStatus('Ready to speak...');
            } catch (error) {
                console.error('Error connecting:', error);
                showError('Failed to connect to server');
            }
        }

        function showConversationView() {
            document.getElementById('topicSelector').style.display = 'none';
            document.getElementById('conversationView').classList.add('active');
            document.getElementById('topicTitle').textContent = selectedTopic.label;
            document.getElementById('transcript').innerHTML = '';
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            document.getElementById('topicSelector').style.display = 'block';
            document.getElementById('conversationView').classList.remove('active');
            selectedTopic = null;
            document.getElementById('startBtn').disabled = true;
            document.querySelectorAll('.topic-card').forEach(card => {
                card.classList.remove('active');
            });
        }

        function addTranscriptLine(speaker, text, isAppend = false) {
            const transcript = document.getElementById('transcript');
            const line = document.createElement('div');
            line.className = 'transcript-line';
            line.innerHTML = `
                <div class="speaker-label">${speaker}</div>
                <div class="speaker-text">${escapeHtml(text)}</div>
            `;
            if (isAppend) {
                transcript.appendChild(line);
            } else {
                transcript.insertBefore(line, transcript.firstChild);
            }
            transcript.scrollTop = transcript.scrollHeight;
        }

        function setStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.classList.add('loading');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startConversation);
        document.getElementById('disconnectBtn').addEventListener('click', disconnect);

        // Load topics on page load
        loadTopics();
    </script>
</body>
</html>
